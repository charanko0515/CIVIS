{% extends "base.html" %}
{% block titulo %}Entrar{% endblock %}
{% block breadcrumb %}Entrar{% endblock %}

{% block conteudo %}
<div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100 w-full max-w-sm">
    <div class="flex items-center gap-2 mb-5">
        <div class="bg-blue-100 text-blue-700 rounded-lg p-2 text-lg">🔑</div>
        <div>
            <h2 class="text-base font-semibold text-gray-700">Entrar na sua conta</h2>
            <p class="text-xs text-gray-400">Acesse para enviar denúncias</p>
        </div>
    </div>
    <form action="/login" method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">E-mail</label>
            <input type="email" name="email" required placeholder="seu@email.com"
                   class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Senha</label>
            <input type="password" name="senha" required placeholder="••••••••"
                   class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">Entrar</button>
    </form>
    <p class="text-sm text-center text-gray-500 mt-4">Não tem conta? <a href="/cadastro" class="text-blue-600 font-semibold hover:underline">Criar conta</a></p>
</div>
{% endblock %}
