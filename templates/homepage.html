<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIVIS - Enviar Denúncia</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <header class="bg-blue-700 text-white px-4 py-3 shadow-md flex items-center justify-between">
        <div>
            <a href="/" class="text-xl font-bold hover:opacity-80 transition">CIVIS</a>
            <p class="text-xs opacity-70">Controle Inteligente de Ocorrências Urbanas</p>
        </div>
        <div class="flex gap-2">
            <a href="/login" class="text-sm border border-white text-white px-3 py-1.5 rounded hover:bg-white hover:text-blue-700 transition">Entrar</a>
            <a href="/cadastro" class="text-sm bg-white text-blue-700 font-semibold px-3 py-1.5 rounded hover:bg-blue-50 transition">Criar conta</a>
        </div>
    </header>

    <!-- Breadcrumb -->
    <div class="bg-white border-b border-gray-200 px-4 py-2 text-xs text-gray-400 flex items-center gap-1">
        <a href="/" class="hover:text-blue-600 transition">Início</a>
        <span>›</span>
        <span class="text-gray-600 font-medium">Nova Denúncia</span>
    </div>

<main class="flex-grow flex items-center justify-center p-4 md:p-8 max-w-6xl mx-auto w-full">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center w-full">
            
            <div class="bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-gray-100 max-w-md w-full justify-self-start">

                <div class="flex items-center gap-2 mb-5">
                    <div class="bg-blue-100 text-blue-700 rounded-lg p-2 text-lg">📋</div>
                    <div>
                        <h2 class="text-xl font-bold text-blue-900">Dados da Denúncia</h2>
                        <p class="text-xs text-gray-400">Preencha para registrar uma ocorrência</p>
                    </div>
                </div>

                <form action="/receber_denuncia" method="POST" enctype="multipart/form-data" class="space-y-4">

                    <input type="hidden" id="lat" name="latitude">
                    <input type="hidden" id="lng" name="longitude">

                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">O que aconteceu?</label>
                        <select name="categoria" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white text-gray-700">
                            <option value="">Selecione uma opção...</option>
                            <option value="Iluminação"> Iluminação Pública Defeituosa</option>
                            <option value="Saneamento"> Esgoto ou Saneamento</option>
                            <option value="Vias"> Buraco na Via / Asfalto</option>
                            <option value="Lixo"> Acúmulo de Lixo Irregular</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Foto do Problema</label>
                        <input type="file" name="foto" accept="image/*" capture="environment" required
                               class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    </div>

                    <div id="status-gps" class="text-xs font-medium text-center bg-amber-50 text-amber-600 p-2 rounded-lg border border-amber-200">
                        📡 Buscando sua localização pelo GPS...
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-sm flex justify-center items-center gap-2">
                        <span>🚀</span> Enviar denúncia
                    </button>
                </form>
            </div>

            <div class="hidden md:flex justify-center items-center">
                <div class="text-gray-300 border-4 border-dashed border-gray-200 rounded-2xl p-12 text-center w-full max-w-sm">
                    Espaço do Mapa / Celular (Como na imagem)
                </div>
            </div>

        </div>
    </main>

    <footer class="text-center text-xs text-gray-400 py-4 border-t border-gray-200">
        CIVIS · CETI Zacarias de Góis · Do Piauí para o Mundo 2026
    </footer>

    <script>
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        document.getElementById('lat').value = position.coords.latitude;
                        document.getElementById('lng').value = position.coords.longitude;
                        const s = document.getElementById('status-gps');
                        s.innerText = " Localização capturada com sucesso!";
                        s.className = "text-xs font-medium text-center bg-green-50 text-green-600 p-2 rounded-lg border border-green-200";
                    },
                    function() {
                        const s = document.getElementById('status-gps');
                        s.innerText = " Erro ao obter GPS. Ative a localização no celular.";
                        s.className = "text-xs font-medium text-center bg-red-50 text-red-600 p-2 rounded-lg border border-red-200";
                    }
                );
            } else {
                const s = document.getElementById('status-gps');
                s.innerText = " Seu navegador não suporta geolocalização.";
                s.className = "text-xs font-medium text-center bg-red-50 text-red-600 p-2 rounded-lg border border-red-200";
            }
        }
    </script>
</body>
</html>
