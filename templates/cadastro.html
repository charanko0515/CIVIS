{% extends "base.html" %}
{% block titulo %}Criar Conta{% endblock %}
{% block breadcrumb %}Criar conta{% endblock %}

{% block conteudo %}
<div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100 w-full max-w-sm">
    <div class="flex items-center gap-2 mb-5">
        <div class="bg-blue-100 text-blue-700 rounded-lg p-2 text-lg">👤</div>
        <div>
            <h2 class="text-base font-semibold text-gray-700">Criar nova conta</h2>
            <p class="text-xs text-gray-400">Junte-se à fiscalização comunitária</p>
        </div>
    </div>
    <form action="/cadastro" method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Nome completo</label>
            <input type="text" name="nome" required placeholder="Seu nome"
                   class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">E-mail</label>
            <input type="email" name="email" required placeholder="seu@email.com"
                   class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Senha</label>
            <input type="password" name="senha" required placeholder="••••••••" id="senha"
                   class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Confirmar senha</label>
            <input type="password" name="confirmar_senha" required placeholder="••••••••" id="confirmar"
                   class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <p id="erro-senha" class="text-xs text-red-500 bg-red-50 border border-red-200 p-2 rounded-lg hidden">⚠️ As senhas não coincidem.</p>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">Criar conta</button>
    </form>
    <p class="text-sm text-center text-gray-500 mt-4">Já tem conta? <a href="/login" class="text-blue-600 font-semibold hover:underline">Entrar</a></p>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.querySelector('form').addEventListener('submit', e => {
        if (document.getElementById('senha').value !== document.getElementById('confirmar').value) {
            e.preventDefault();
            document.getElementById('erro-senha').classList.remove('hidden');
        }
    });
</script>
{% endblock %}
